<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="450" viewBox="0 0 1040 450" role="img" aria-labelledby="title desc">
  <title id="title">El proceso de ML por etapas</title>
  <desc id="desc">Un flujo horizontal del ciclo de vida del aprendizaje automático, desde el encuadre del negocio hasta los datos listos para el modelo, señalando que la mayor parte del esfuerzo está en las primeras etapas.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .card { fill: #ffffff; stroke-width: 1.8; }
      .num { fill: #ffffff; font-family: Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .cardhead { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .desc2 { font-family: Segoe UI, Arial, sans-serif; font-size: 12px; fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; }
      .efftxt { font-family: Segoe UI, Arial, sans-serif; font-size: 12.5px; font-weight: 700; fill: #b45309; }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/>
    </marker>
    <linearGradient id="eff" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#fde7c4" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="450"/>
  <text class="title" x="60" y="52">El proceso de ML por etapas</text>
  <text class="subtitle" x="60" y="80">La mayor parte del esfuerzo está en las primeras etapas: encuadrar, recolectar y limpiar los datos.</text>

  <!-- arrows -->
  <line class="arrow" x1="190" y1="235" x2="208" y2="235" marker-end="url(#ah)"/>
  <line class="arrow" x1="350" y1="235" x2="368" y2="235" marker-end="url(#ah)"/>
  <line class="arrow" x1="510" y1="235" x2="528" y2="235" marker-end="url(#ah)"/>
  <line class="arrow" x1="670" y1="235" x2="688" y2="235" marker-end="url(#ah)"/>
  <line class="arrow" x1="830" y1="235" x2="848" y2="235" marker-end="url(#ah)"/>

  <!-- Etapa 1 -->
  <rect class="card" x="50" y="160" width="140" height="150" rx="10" stroke="#004a99"/>
  <circle cx="120" cy="190" r="15" fill="#004a99"/>
  <text class="num" x="120" y="195" text-anchor="middle">1</text>
  <text class="cardhead" x="120" y="226" text-anchor="middle" fill="#004a99">Encuadre del</text>
  <text class="cardhead" x="120" y="244" text-anchor="middle" fill="#004a99">Negocio</text>
  <text class="desc2" x="120" y="270" text-anchor="middle">Definir el problema</text>
  <text class="desc2" x="120" y="286" text-anchor="middle">y métrica de éxito</text>

  <!-- Etapa 2 -->
  <rect class="card" x="210" y="160" width="140" height="150" rx="10" stroke="#0e7490"/>
  <circle cx="280" cy="190" r="15" fill="#0e7490"/>
  <text class="num" x="280" y="195" text-anchor="middle">2</text>
  <text class="cardhead" x="280" y="226" text-anchor="middle" fill="#0e7490">Recolección</text>
  <text class="cardhead" x="280" y="244" text-anchor="middle" fill="#0e7490">de Datos</text>
  <text class="desc2" x="280" y="270" text-anchor="middle">Reunir datos crudos</text>
  <text class="desc2" x="280" y="286" text-anchor="middle">desde las fuentes</text>

  <!-- Etapa 3 -->
  <rect class="card" x="370" y="160" width="140" height="150" rx="10" stroke="#b45309"/>
  <circle cx="440" cy="190" r="15" fill="#b45309"/>
  <text class="num" x="440" y="195" text-anchor="middle">3</text>
  <text class="cardhead" x="440" y="226" text-anchor="middle" fill="#b45309">Limpieza</text>
  <text class="cardhead" x="440" y="244" text-anchor="middle" fill="#b45309">de Datos</text>
  <text class="desc2" x="440" y="270" text-anchor="middle">Corregir errores y</text>
  <text class="desc2" x="440" y="286" text-anchor="middle">valores faltantes</text>

  <!-- Etapa 4 -->
  <rect class="card" x="530" y="160" width="140" height="150" rx="10" stroke="#15803d"/>
  <circle cx="600" cy="190" r="15" fill="#15803d"/>
  <text class="num" x="600" y="195" text-anchor="middle">4</text>
  <text class="cardhead" x="600" y="226" text-anchor="middle" fill="#15803d">Ingeniería de</text>
  <text class="cardhead" x="600" y="244" text-anchor="middle" fill="#15803d">Características</text>
  <text class="desc2" x="600" y="270" text-anchor="middle">Crear y transformar</text>
  <text class="desc2" x="600" y="286" text-anchor="middle">características</text>

  <!-- Etapa 5 -->
  <rect class="card" x="690" y="160" width="140" height="150" rx="10" stroke="#64748b"/>
  <circle cx="760" cy="190" r="15" fill="#64748b"/>
  <text class="num" x="760" y="195" text-anchor="middle">5</text>
  <text class="cardhead" x="760" y="226" text-anchor="middle" fill="#64748b">Dimensionado</text>
  <text class="cardhead" x="760" y="244" text-anchor="middle" fill="#64748b">del Dataset</text>
  <text class="desc2" x="760" y="270" text-anchor="middle">Asegurar datos</text>
  <text class="desc2" x="760" y="286" text-anchor="middle">representativos</text>

  <!-- Etapa 6 -->
  <rect class="card" x="850" y="160" width="140" height="150" rx="10" stroke="#004a99"/>
  <circle cx="920" cy="190" r="15" fill="#004a99"/>
  <text class="num" x="920" y="195" text-anchor="middle">6</text>
  <text class="cardhead" x="920" y="226" text-anchor="middle" fill="#004a99">Datos Listos</text>
  <text class="cardhead" x="920" y="244" text-anchor="middle" fill="#004a99">para el Modelo</text>
  <text class="desc2" x="920" y="270" text-anchor="middle">Conjunto limpio y</text>
  <text class="desc2" x="920" y="286" text-anchor="middle">etiquetado listo</text>

  <!-- Cuña de esfuerzo -->
  <polygon points="50,360 990,386 990,402 50,402" fill="url(#eff)" stroke="#f59e0b" stroke-width="1"/>
  <text class="efftxt" x="50" y="350">Más tiempo y esfuerzo</text>
  <text class="efftxt" x="990" y="350" text-anchor="end">Menos esfuerzo</text>
  <text class="desc2" x="520" y="430" text-anchor="middle">Tiempo y esfuerzo invertido por etapa</text>
</svg>
