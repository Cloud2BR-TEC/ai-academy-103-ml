<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">Esquema lógico para implementar un modelo</title>
  <desc id="desc">Un flujo de decisión de arriba hacia abajo que se reduce del tipo de problema a la familia de algoritmos, luego las restricciones de despliegue y finalmente la elección del modelo.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .stage { font-family: Segoe UI, Arial, sans-serif; font-size: 18px; font-weight: 700; }
      .num { fill: #ffffff; font-family: Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .chip { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #ffffff; }
      .final { font-family: Segoe UI, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #ffffff; }
      .finalsub { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; fill: #ffffff; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="620"/>
  <text class="title" x="60" y="52">Esquema lógico para implementar un modelo</text>
  <text class="subtitle" x="60" y="80">Cada etapa reduce la búsqueda hasta que queda una sola elección de modelo.</text>

  <!-- arrows -->
  <line class="arrow" x1="520" y1="210" x2="520" y2="253" marker-end="url(#ah)"/>
  <line class="arrow" x1="520" y1="345" x2="520" y2="388" marker-end="url(#ah)"/>
  <line class="arrow" x1="520" y1="480" x2="520" y2="523" marker-end="url(#ah)"/>

  <!-- Etapa 1: Tipo de problema -->
  <rect class="card" x="80" y="120" width="880" height="90" rx="10"/>
  <circle cx="120" cy="165" r="16" fill="#004a99"/>
  <text class="num" x="120" y="170" text-anchor="middle">1</text>
  <text class="stage" x="150" y="171" fill="#004a99">Tipo de problema</text>
  <rect x="370" y="146" width="180" height="38" rx="10" fill="#004a99"/>
  <text class="chip" x="460" y="170" text-anchor="middle">Clasificación</text>
  <rect x="570" y="146" width="180" height="38" rx="10" fill="#004a99"/>
  <text class="chip" x="660" y="170" text-anchor="middle">Regresión</text>
  <rect x="770" y="146" width="170" height="38" rx="10" fill="#004a99"/>
  <text class="chip" x="855" y="170" text-anchor="middle">Pronóstico</text>

  <!-- Etapa 2: Familia de algoritmos -->
  <rect class="card" x="80" y="255" width="880" height="90" rx="10"/>
  <circle cx="120" cy="300" r="16" fill="#0e7490"/>
  <text class="num" x="120" y="305" text-anchor="middle">2</text>
  <text class="stage" x="150" y="306" fill="#0e7490">Familia de algoritmos</text>
  <rect x="430" y="281" width="120" height="38" rx="10" fill="#0e7490"/>
  <text class="chip" x="490" y="305" text-anchor="middle">Lineal</text>
  <rect x="565" y="281" width="120" height="38" rx="10" fill="#0e7490"/>
  <text class="chip" x="625" y="305" text-anchor="middle">Ensamble</text>
  <rect x="700" y="281" width="110" height="38" rx="10" fill="#0e7490"/>
  <text class="chip" x="755" y="305" text-anchor="middle">Kernel</text>
  <rect x="825" y="281" width="115" height="38" rx="10" fill="#0e7490"/>
  <text class="chip" x="882" y="305" text-anchor="middle">Red neuronal</text>

  <!-- Etapa 3: Restricciones de despliegue -->
  <rect class="card" x="80" y="390" width="880" height="90" rx="10"/>
  <circle cx="120" cy="435" r="16" fill="#b45309"/>
  <text class="num" x="120" y="440" text-anchor="middle">3</text>
  <text class="stage" x="150" y="430" fill="#b45309">Restricciones</text>
  <text class="stage" x="150" y="452" fill="#b45309">de despliegue</text>
  <rect x="360" y="416" width="180" height="38" rx="10" fill="#b45309"/>
  <text class="chip" x="450" y="440" text-anchor="middle">Latencia</text>
  <rect x="560" y="416" width="180" height="38" rx="10" fill="#b45309"/>
  <text class="chip" x="650" y="440" text-anchor="middle">Interpretabilidad</text>
  <rect x="760" y="416" width="180" height="38" rx="10" fill="#b45309"/>
  <text class="chip" x="850" y="440" text-anchor="middle">Tamaño de datos</text>

  <!-- Etapa 4: Elección del modelo -->
  <rect x="80" y="525" width="880" height="75" rx="10" fill="#15803d"/>
  <circle cx="120" cy="562" r="16" fill="#ffffff"/>
  <text class="num" x="120" y="567" text-anchor="middle" fill="#15803d">4</text>
  <text class="final" x="520" y="558" text-anchor="middle">Elección final del modelo</text>
  <text class="finalsub" x="520" y="582" text-anchor="middle">El algoritmo y la configuración que mejor se ajustan al problema y sus restricciones.</text>
</svg>
