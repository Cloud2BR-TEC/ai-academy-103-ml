<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">Funciones de activación comunes</title>
  <desc id="desc">Gráfico de líneas de Sigmoide, Tanh, ReLU y Leaky ReLU trazadas frente a la pre-activación z de menos cuatro a cuatro.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .axis { stroke: #0f172a; stroke-width: 3; }
      .grid { stroke: #e2e8f0; stroke-width: 1; }
      .axis-label { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 700; }
      .tick { fill: #475569; font-family: Segoe UI, Arial, sans-serif; font-size: 12px; }
      .legtext { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #1f2937; }
      .sigmoid { fill: none; stroke: #004a99; stroke-width: 4; }
      .tanh { fill: none; stroke: #0e7490; stroke-width: 4; }
      .relu { fill: none; stroke: #15803d; stroke-width: 4; }
      .leaky { fill: none; stroke: #b45309; stroke-width: 4; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="560"/>
  <text class="title" x="60" y="52">Funciones de activación comunes</text>
  <text class="subtitle" x="60" y="80">Cada curva aplasta la pre-activación z de forma distinta; la no linealidad elegida moldea cómo aprende la red.</text>

  <!-- plot card -->
  <rect class="card" x="60" y="110" width="700" height="410" rx="10"/>

  <!-- gridlines -->
  <line class="grid" x1="140" y1="150" x2="140" y2="490"/>
  <line class="grid" x1="235" y1="150" x2="235" y2="490"/>
  <line class="grid" x1="330" y1="150" x2="330" y2="490"/>
  <line class="grid" x1="425" y1="150" x2="425" y2="490"/>
  <line class="grid" x1="615" y1="150" x2="615" y2="490"/>
  <line class="grid" x1="710" y1="150" x2="710" y2="490"/>

  <!-- axes -->
  <line class="axis" x1="120" y1="370" x2="740" y2="370"/>
  <line class="axis" x1="520" y1="140" x2="520" y2="500"/>
  <text class="axis-label" x="730" y="392" text-anchor="end">z</text>
  <text class="axis-label" x="500" y="150" text-anchor="end">salida</text>

  <!-- z ticks -->
  <text class="tick" x="140" y="388" text-anchor="middle">-4</text>
  <text class="tick" x="330" y="388" text-anchor="middle">-2</text>
  <text class="tick" x="615" y="388" text-anchor="middle">2</text>
  <text class="tick" x="710" y="388" text-anchor="middle">3</text>
  <!-- output ticks -->
  <text class="tick" x="512" y="295" text-anchor="end">1</text>
  <text class="tick" x="512" y="455" text-anchor="end">-1</text>

  <!-- Leaky ReLU -->
  <polyline class="leaky" points="140,402 520,370 805,130"/>
  <!-- ReLU -->
  <polyline class="relu" points="140,370 520,370 805,130"/>
  <!-- Sigmoide -->
  <polyline class="sigmoid" points="140,369 235,366 330,360 425,348 520,330 615,312 710,300 805,294 900,291"/>
  <!-- Tanh -->
  <polyline class="tanh" points="140,450 235,450 330,447 425,431 520,370 615,309 710,293 805,290 900,290"/>

  <!-- curve end labels -->
  <text class="legtext" x="812" y="128" fill="#15803d">ReLU</text>

  <!-- legend card -->
  <rect class="card" x="790" y="160" width="190" height="210" rx="10"/>
  <text class="legtext" x="810" y="190">Leyenda</text>
  <line class="sigmoid" x1="810" y1="220" x2="850" y2="220"/>
  <text class="legtext" x="860" y="225">Sigmoide</text>
  <line class="tanh" x1="810" y1="255" x2="850" y2="255"/>
  <text class="legtext" x="860" y="260">Tanh</text>
  <line class="relu" x1="810" y1="290" x2="850" y2="290"/>
  <text class="legtext" x="860" y="295">ReLU</text>
  <line class="leaky" x1="810" y1="325" x2="850" y2="325"/>
  <text class="legtext" x="860" y="330">Leaky ReLU</text>
</svg>
