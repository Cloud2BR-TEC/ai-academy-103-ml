<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="540" viewBox="0 0 1040 540" role="img" aria-labelledby="title desc">
  <title id="title">Línea de mejor ajuste de regresión lineal</title>
  <desc id="desc">Una dispersión de puntos con una línea recta de mejor ajuste. Las líneas verticales discontinuas muestran los residuos (el error que minimiza la pérdida cuadrática).</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .axis { stroke: #0f172a; stroke-width: 3; }
      .axis-label { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 700; }
      .line { fill: none; stroke: #004a99; stroke-width: 5; }
      .pt { fill: #0e7490; }
      .resid { stroke: #b45309; stroke-width: 2; stroke-dasharray: 5 4; }
      .note { fill: #475569; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="540"/>
  <text class="title" x="60" y="52">Regresión lineal: una línea recta a través de los datos</text>
  <text class="subtitle" x="60" y="80">Elija la línea cuya brecha vertical cuadrática total a los puntos sea lo más pequeña posible.</text>
  <line class="axis" x1="120" y1="470" x2="960" y2="470"/>
  <line class="axis" x1="120" y1="470" x2="120" y2="120"/>
  <text class="axis-label" x="540" y="510" text-anchor="middle">Característica x</text>
  <text class="axis-label" x="60" y="300" transform="rotate(-90 60 300)" text-anchor="middle">Objetivo y</text>
  <!-- best fit line -->
  <line class="line" x1="150" y1="420" x2="930" y2="170"/>
  <!-- points with residuals (x, y_point) on line y = 420 - (x-150)*0.3205 -->
  <line class="resid" x1="210" y1="360" x2="210" y2="400.8"/>
  <circle class="pt" cx="210" cy="360" r="8"/>
  <line class="resid" x1="300" y1="395" x2="300" y2="372"/>
  <circle class="pt" cx="300" cy="395" r="8"/>
  <line class="resid" x1="390" y1="320" x2="390" y2="343.1"/>
  <circle class="pt" cx="390" cy="320" r="8"/>
  <line class="resid" x1="480" y1="330" x2="480" y2="314.3"/>
  <circle class="pt" cx="480" cy="330" r="8"/>
  <line class="resid" x1="570" y1="250" x2="570" y2="285.4"/>
  <circle class="pt" cx="570" cy="250" r="8"/>
  <line class="resid" x1="660" y1="285" x2="660" y2="256.6"/>
  <circle class="pt" cx="660" cy="285" r="8"/>
  <line class="resid" x1="750" y1="200" x2="750" y2="227.7"/>
  <circle class="pt" cx="750" cy="200" r="8"/>
  <line class="resid" x1="840" y1="225" x2="840" y2="198.9"/>
  <circle class="pt" cx="840" cy="225" r="8"/>
  <!-- legend -->
  <circle class="pt" cx="650" cy="430" r="8"/>
  <text class="note" x="666" y="435">punto observado</text>
  <line class="resid" x1="800" y1="424" x2="800" y2="438"/>
  <text class="note" x="812" y="435">residuo = error de predicción</text>
  <text class="note" x="650" y="462" font-weight="700" fill="#004a99">pendiente = efecto de x; intercepto = valor base</text>
</svg>
