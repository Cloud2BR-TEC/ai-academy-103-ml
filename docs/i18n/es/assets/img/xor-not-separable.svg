<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">XOR no es linealmente separable</title>
  <desc id="desc">Los cuatro puntos de XOR no pueden dividirse en sus dos clases con ninguna línea recta única, por lo que un solo perceptrón falla.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .axis { stroke: #0f172a; stroke-width: 3; }
      .axis-label { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 700; }
      .tick { fill: #475569; font-family: Segoe UI, Arial, sans-serif; font-size: 13px; }
      .label { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; fill: #1f2937; }
      .desc2 { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; fill: #475569; }
      .cand { stroke: #b91c1c; stroke-width: 2.5; stroke-dasharray: 8 7; fill: none; }
      .sep { stroke: #15803d; stroke-width: 3; fill: none; }
      .c0 { fill: #004a99; stroke: #0f172a; stroke-width: 1.5; }
      .c1 { fill: #b45309; stroke: #0f172a; stroke-width: 1.5; }
      .legtext { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #1f2937; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="560"/>
  <text class="title" x="60" y="52">XOR no es linealmente separable</text>
  <text class="subtitle" x="60" y="80">Ninguna línea recta divide las dos clases de XOR — un solo perceptrón solo traza una línea, así que falla.</text>

  <!-- main plot card -->
  <rect class="card" x="60" y="110" width="540" height="400" rx="10"/>

  <!-- axes -->
  <line class="axis" x1="150" y1="450" x2="560" y2="450"/>
  <line class="axis" x1="150" y1="450" x2="150" y2="140"/>
  <text class="axis-label" x="360" y="492" text-anchor="middle">x1</text>
  <text class="axis-label" x="108" y="300" transform="rotate(-90 108 300)" text-anchor="middle">x2</text>
  <text class="tick" x="200" y="472">0</text>
  <text class="tick" x="490" y="472">1</text>
  <text class="tick" x="130" y="425" text-anchor="end">0</text>
  <text class="tick" x="130" y="185" text-anchor="end">1</text>

  <!-- candidate separating lines (all fail) -->
  <line class="cand" x1="160" y1="200" x2="555" y2="430"/>
  <line class="cand" x1="180" y1="445" x2="540" y2="150"/>
  <line class="cand" x1="160" y1="360" x2="555" y2="250"/>

  <!-- XOR points -->
  <circle class="c0" cx="200" cy="420" r="14"/>
  <circle class="c0" cx="490" cy="180" r="14"/>
  <rect class="c1" x="186" y="166" width="28" height="28" rx="3"/>
  <rect class="c1" x="476" y="406" width="28" height="28" rx="3"/>
  <text class="desc2" x="222" y="425">(0,0)</text>
  <text class="desc2" x="512" y="185">(1,1)</text>
  <text class="desc2" x="222" y="185">(0,1)</text>
  <text class="desc2" x="512" y="425">(1,0)</text>

  <!-- legend inside main plot -->
  <circle class="c0" cx="180" cy="528" r="11"/>
  <text class="legtext" x="198" y="533">Clase 0</text>
  <rect class="c1" x="320" y="517" width="22" height="22" rx="3"/>
  <text class="legtext" x="350" y="533">Clase 1</text>
  <line class="cand" x1="450" y1="528" x2="500" y2="528"/>
  <text class="legtext" x="508" y="533">Línea candidata</text>

  <!-- linearly separable inset -->
  <rect class="card" x="640" y="150" width="340" height="300" rx="10"/>
  <text class="label" x="810" y="180" text-anchor="middle" font-weight="700">Linealmente separable (contraste)</text>
  <line class="axis" x1="700" y1="410" x2="940" y2="410"/>
  <line class="axis" x1="700" y1="410" x2="700" y2="210"/>
  <text class="axis-label" x="938" y="402" text-anchor="end">x1</text>
  <circle class="c0" cx="740" cy="380" r="11"/>
  <circle class="c0" cx="740" cy="250" r="11"/>
  <circle class="c0" cx="900" cy="380" r="11"/>
  <rect class="c1" x="889" y="239" width="22" height="22" rx="3"/>
  <line class="sep" x1="820" y1="210" x2="940" y2="330"/>
  <text class="desc2" x="810" y="430" text-anchor="middle">Una sola recta separa las clases.</text>

  <!-- caption -->
  <text class="desc2" x="60" y="548" font-size="14" fill="#b91c1c" font-weight="700">Ninguna línea recta única puede separar las dos clases — por eso un solo perceptrón no puede aprender XOR.</text>
</svg>
