<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">Cómo elegir una métrica para clasificación desbalanceada</title>
  <desc id="desc">Un diagrama de decisión: si los datos están desbalanceados, prefiere F1, PR-AUC o MCC en vez de la exactitud, luego pondera la sensibilidad cuando los falsos negativos son costosos, la precisión cuando los falsos positivos son costosos, o la pérdida logarítmica y la calibración cuando importa la calidad de las probabilidades.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 26px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .start { fill: #0f172a; }
      .starttxt { font-family: Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #ffffff; }
      .diamond { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
      .qtxt { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; }
      .branch { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #475569; }
      .label { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; fill: #1f2937; }
      .head { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; font-weight: 700; }
      .metric { font-family: Segoe UI, Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .desc2 { font-family: Segoe UI, Arial, sans-serif; font-size: 12px; fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="620"/>
  <text class="title" x="60" y="52">Elegir una métrica para clasificación desbalanceada</text>
  <text class="subtitle" x="60" y="80">Deja que el costo de cada tipo de error guíe la métrica &#8212; la exactitud sola puede engañar.</text>

  <!-- inicio -->
  <rect class="start" x="350" y="104" width="340" height="48" rx="10"/>
  <text class="starttxt" x="520" y="134" text-anchor="middle">Elegir una métrica de clasificación</text>
  <line class="arrow" x1="520" y1="152" x2="520" y2="184" marker-end="url(#ah)"/>

  <!-- rombo -->
  <polygon class="diamond" points="520,184 670,239 520,294 370,239"/>
  <text class="qtxt" x="520" y="244" text-anchor="middle">¿Los datos están desbalanceados?</text>

  <!-- rama No -->
  <line class="arrow" x1="670" y1="239" x2="724" y2="239" marker-end="url(#ah)"/>
  <text class="branch" x="697" y="229" text-anchor="middle">No</text>
  <rect class="card" x="726" y="206" width="244" height="66" rx="10" stroke="#64748b"/>
  <text class="head" x="848" y="232" text-anchor="middle" fill="#64748b">La exactitud sirve de base</text>
  <text class="desc2" x="848" y="252" text-anchor="middle">cuando las clases están equilibradas.</text>

  <!-- rama Sí -->
  <line class="arrow" x1="520" y1="294" x2="520" y2="326" marker-end="url(#ah)"/>
  <text class="branch" x="534" y="314">Sí</text>
  <rect x="320" y="326" width="400" height="70" rx="10" fill="#ffffff" stroke="#15803d" stroke-width="2"/>
  <text class="head" x="520" y="354" text-anchor="middle" fill="#15803d" font-size="15">Evita la exactitud simple</text>
  <text class="label" x="520" y="378" text-anchor="middle">Prefiere F1 &#183; PR-AUC &#183; MCC</text>

  <!-- distribuidor -->
  <line class="arrow" x1="520" y1="396" x2="520" y2="424" marker-end="url(#ah)"/>
  <text class="branch" x="640" y="418" text-anchor="middle">¿Qué error cuesta más?</text>
  <path class="arrow" d="M200,430 L840,430"/>
  <line x1="520" y1="424" x2="520" y2="430" class="arrow"/>
  <line class="arrow" x1="200" y1="430" x2="200" y2="466" marker-end="url(#ah)"/>
  <line class="arrow" x1="520" y1="430" x2="520" y2="466" marker-end="url(#ah)"/>
  <line class="arrow" x1="840" y1="430" x2="840" y2="466" marker-end="url(#ah)"/>

  <!-- resultado 1 -->
  <rect class="card" x="70" y="468" width="260" height="120" rx="10" stroke="#0e7490"/>
  <text class="head" x="200" y="496" text-anchor="middle" fill="#0e7490">Falsos negativos costosos</text>
  <text class="metric" x="200" y="528" text-anchor="middle" fill="#0e7490">Pondera sensibilidad</text>
  <text class="desc2" x="200" y="554" text-anchor="middle">Detecta los positivos &#8212; perder</text>
  <text class="desc2" x="200" y="570" text-anchor="middle">un caso real es caro.</text>

  <!-- resultado 2 -->
  <rect class="card" x="390" y="468" width="260" height="120" rx="10" stroke="#b45309"/>
  <text class="head" x="520" y="496" text-anchor="middle" fill="#b45309">Falsos positivos costosos</text>
  <text class="metric" x="520" y="528" text-anchor="middle" fill="#b45309">Pondera precisión</text>
  <text class="desc2" x="520" y="554" text-anchor="middle">Evita falsas alarmas &#8212; actuar</text>
  <text class="desc2" x="520" y="570" text-anchor="middle">sobre un error es costoso.</text>

  <!-- resultado 3 -->
  <rect class="card" x="710" y="468" width="260" height="120" rx="10" stroke="#004a99"/>
  <text class="head" x="840" y="496" text-anchor="middle" fill="#004a99">Calidad de probabilidad</text>
  <text class="metric" x="840" y="528" text-anchor="middle" fill="#004a99">Log loss / calibración</text>
  <text class="desc2" x="840" y="554" text-anchor="middle">Las puntuaciones deben ser</text>
  <text class="desc2" x="840" y="570" text-anchor="middle">fiables, no solo ordenadas.</text>
</svg>
