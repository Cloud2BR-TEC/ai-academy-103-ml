<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">Resumen del despliegue — en línea vs por lotes</title>
  <desc id="desc">Dos opciones de despliegue. Un endpoint en línea atiende solicitudes en tiempo real donde un usuario o una app está esperando. Un endpoint por lotes puntúa una tabla completa sin conexión, donde nadie espera. Elige según quién está esperando.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .cardhead { font-family: Segoe UI, Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #ffffff; }
      .sub2 { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .pill { font-family: Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #ffffff; }
      .bullet { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; fill: #1f2937; }
      .chip { font-family: Segoe UI, Arial, sans-serif; font-size: 12.5px; font-style: italic; fill: #475569; }
      .foot { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #ffffff; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="560"/>
  <text class="title" x="60" y="52">Resumen del despliegue — en línea vs lotes</text>
  <text class="subtitle" x="60" y="80">Dos formas de servir un modelo. Elige la que coincida con quién espera el resultado.</text>

  <!-- Píldora de decisión -->
  <rect x="410" y="104" width="220" height="48" rx="24" fill="#0f172a"/>
  <text class="pill" x="520" y="134" text-anchor="middle">¿Quién espera?</text>
  <path class="arrow" d="M440,148 C360,176 320,182 290,202" marker-end="url(#ah)"/>
  <path class="arrow" d="M600,148 C680,176 720,182 750,202" marker-end="url(#ah)"/>

  <!-- Tarjeta EN LÍNEA -->
  <rect class="card" x="60" y="206" width="430" height="320" rx="12"/>
  <rect x="60" y="206" width="430" height="48" rx="12" fill="#004a99"/>
  <rect x="60" y="230" width="430" height="24" fill="#004a99"/>
  <text class="cardhead" x="84" y="238">Endpoint en línea</text>
  <text class="sub2" x="84" y="288" fill="#004a99">Tiempo real · sincrónico</text>

  <circle cx="92" cy="318" r="4" fill="#004a99"/>
  <text class="bullet" x="108" y="323">Un usuario o app espera la respuesta</text>
  <circle cx="92" cy="352" r="4" fill="#004a99"/>
  <text class="bullet" x="108" y="357">Una solicitud pequeña a la vez</text>
  <circle cx="92" cy="386" r="4" fill="#004a99"/>
  <text class="bullet" x="108" y="391">Baja latencia — los milisegundos importan</text>
  <circle cx="92" cy="420" r="4" fill="#004a99"/>
  <text class="bullet" x="108" y="425">Cómputo siempre activo</text>

  <rect x="84" y="456" width="382" height="48" rx="8" fill="#eef4fb"/>
  <text class="chip" x="104" y="485" fill="#004a99">p. ej. detección de fraude al pagar en caja</text>

  <!-- Tarjeta POR LOTES -->
  <rect class="card" x="550" y="206" width="430" height="320" rx="12"/>
  <rect x="550" y="206" width="430" height="48" rx="12" fill="#0e7490"/>
  <rect x="550" y="230" width="430" height="24" fill="#0e7490"/>
  <text class="cardhead" x="574" y="238">Endpoint por lotes</text>
  <text class="sub2" x="574" y="288" fill="#0e7490">Sin conexión · asincrónico</text>

  <circle cx="582" cy="318" r="4" fill="#0e7490"/>
  <text class="bullet" x="598" y="323">Nadie está esperando ahora mismo</text>
  <circle cx="582" cy="352" r="4" fill="#0e7490"/>
  <text class="bullet" x="598" y="357">Puntúa una tabla completa de una vez</text>
  <circle cx="582" cy="386" r="4" fill="#0e7490"/>
  <text class="bullet" x="598" y="391">Rendimiento por encima de la latencia</text>
  <circle cx="582" cy="420" r="4" fill="#0e7490"/>
  <text class="bullet" x="598" y="425">El cómputo arranca, corre y se apaga</text>

  <rect x="574" y="456" width="382" height="48" rx="8" fill="#e7f5f8"/>
  <text class="chip" x="594" y="485" fill="#0e7490">p. ej. puntuación nocturna de cada cliente</text>

  <!-- Decisión de pie -->
  <rect x="290" y="526" width="460" height="26" rx="13" fill="#0f172a"/>
  <text class="foot" x="520" y="544" text-anchor="middle">Elige según quién está esperando.</text>
</svg>
