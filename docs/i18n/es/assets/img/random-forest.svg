<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="540" viewBox="0 0 1040 540" role="img" aria-labelledby="title desc">
  <title id="title">Bagging y votación de bosque aleatorio</title>
  <desc id="desc">Muchos árboles de decisión se entrenan con distintas muestras bootstrap y subconjuntos de características, y luego sus predicciones se combinan por voto mayoritario o promedio.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .data { fill: #ffffff; stroke: #0f172a; stroke-width: 2.5; }
      .sample { fill: #fff7ed; stroke: #b45309; stroke-width: 2.5; }
      .vote { fill: #e0f2fe; stroke: #0e7490; stroke-width: 2.5; }
      .final { fill: #dcfce7; stroke: #15803d; stroke-width: 3; }
      .lbl { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .edge { stroke: #475569; stroke-width: 2.5; }
      .note { fill: #475569; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; }
      .tree { stroke: #004a99; stroke-width: 2.5; fill: none; }
      .tnode { fill: #004a99; }
    </style>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#475569"/></marker>
    <g id="minitree">
      <line class="tree" x1="40" y1="14" x2="20" y2="44"/>
      <line class="tree" x1="40" y1="14" x2="60" y2="44"/>
      <line class="tree" x1="20" y1="44" x2="10" y2="70"/>
      <line class="tree" x1="20" y1="44" x2="32" y2="70"/>
      <line class="tree" x1="60" y1="44" x2="50" y2="70"/>
      <line class="tree" x1="60" y1="44" x2="72" y2="70"/>
      <circle class="tnode" cx="40" cy="14" r="5"/>
      <circle class="tnode" cx="20" cy="44" r="5"/>
      <circle class="tnode" cx="60" cy="44" r="5"/>
    </g>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="540"/>
  <text class="title" x="60" y="52">Bosque aleatorio: muchos árboles votan</text>
  <text class="subtitle" x="60" y="80">Cada árbol ve una muestra aleatoria de filas y características; combinarlos cancela sus errores individuales.</text>
  <!-- training data -->
  <rect class="data" x="60" y="230" width="130" height="80" rx="10"/>
  <text class="lbl" x="125" y="266" text-anchor="middle">datos de</text>
  <text class="lbl" x="125" y="286" text-anchor="middle">entrenamiento</text>
  <!-- bootstrap arrows to trees -->
  <line class="edge" x1="190" y1="255" x2="330" y2="160" marker-end="url(#ar2)"/>
  <line class="edge" x1="190" y1="270" x2="330" y2="270" marker-end="url(#ar2)"/>
  <line class="edge" x1="190" y1="285" x2="330" y2="380" marker-end="url(#ar2)"/>
  <!-- three trees -->
  <rect class="sample" x="340" y="120" width="120" height="90" rx="10"/>
  <use href="#minitree" x="380" y="120"/>
  <text class="lbl" x="400" y="200" text-anchor="middle">árbol 1 → A</text>
  <rect class="sample" x="340" y="230" width="120" height="90" rx="10"/>
  <use href="#minitree" x="380" y="230"/>
  <text class="lbl" x="400" y="310" text-anchor="middle">árbol 2 → A</text>
  <rect class="sample" x="340" y="340" width="120" height="90" rx="10"/>
  <use href="#minitree" x="380" y="340"/>
  <text class="lbl" x="400" y="420" text-anchor="middle">árbol 3 → B</text>
  <!-- vote box -->
  <line class="edge" x1="460" y1="165" x2="620" y2="255" marker-end="url(#ar2)"/>
  <line class="edge" x1="460" y1="275" x2="620" y2="275" marker-end="url(#ar2)"/>
  <line class="edge" x1="460" y1="385" x2="620" y2="295" marker-end="url(#ar2)"/>
  <rect class="vote" x="630" y="230" width="160" height="90" rx="10"/>
  <text class="lbl" x="710" y="270" text-anchor="middle">voto mayoritario</text>
  <text class="lbl" x="710" y="292" text-anchor="middle">(o promedio)</text>
  <!-- final -->
  <line class="edge" x1="790" y1="275" x2="860" y2="275" marker-end="url(#ar2)"/>
  <rect class="final" x="870" y="235" width="120" height="80" rx="10"/>
  <text class="lbl" x="930" y="280" text-anchor="middle">clase A</text>
  <text class="note" x="60" y="490" font-weight="700" fill="#004a99">El bagging reduce la varianza: ningún árbol ruidoso puede dominar la respuesta del conjunto.</text>
</svg>
