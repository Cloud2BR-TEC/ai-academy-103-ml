<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="470" viewBox="0 0 1040 470" role="img" aria-labelledby="title desc">
  <title id="title">Flujo de datos de entrenamiento y prueba</title>
  <desc id="desc">Un conjunto de datos se divide en entrenamiento y prueba; el conjunto de prueba se separa temprano y permanece intacto mientras el de entrenamiento ajusta el modelo, y solo se usa una vez para la evaluación final.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 27px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .node { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #ffffff; }
      .label { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; fill: #1f2937; }
      .desc2 { font-family: Segoe UI, Arial, sans-serif; font-size: 12px; fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; }
      .green { stroke: #15803d; stroke-width: 2.5; fill: none; }
      .orange { stroke: #b45309; stroke-width: 2.5; fill: none; stroke-dasharray: 8 5; }
      .otxt { font-family: Segoe UI, Arial, sans-serif; font-size: 12.5px; font-weight: 700; fill: #b45309; }
      .gtxt { font-family: Segoe UI, Arial, sans-serif; font-size: 12.5px; font-weight: 700; fill: #15803d; }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#15803d"/></marker>
    <marker id="ao" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#b45309"/></marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="470"/>
  <text class="title" x="60" y="52">Flujo de datos de entrenamiento y prueba</text>
  <text class="subtitle" x="60" y="80">La prueba se separa temprano y queda intacta — se abre solo una vez para la evaluación final.</text>

  <!-- Conjunto completo -->
  <rect class="card" x="50" y="205" width="150" height="100" rx="10" stroke="#004a99"/>
  <rect x="50" y="205" width="150" height="34" rx="10" fill="#004a99"/>
  <rect x="50" y="222" width="150" height="17" fill="#004a99"/>
  <text class="node" x="125" y="228" text-anchor="middle">Conjunto completo</text>
  <text class="desc2" x="125" y="265" text-anchor="middle">filas etiquetadas</text>
  <text class="desc2" x="125" y="282" text-anchor="middle">a dividir</text>

  <!-- Flechas de división -->
  <path class="green" d="M200,240 C250,210 260,178 318,172" marker-end="url(#ag)"/>
  <text class="gtxt" x="206" y="195">entren.</text>
  <path class="orange" d="M200,278 C250,308 260,338 318,344" marker-end="url(#ao)"/>
  <text class="otxt" x="208" y="320">prueba</text>

  <!-- Entrenamiento -->
  <rect class="card" x="320" y="142" width="150" height="62" rx="10" stroke="#15803d"/>
  <rect x="320" y="142" width="150" height="30" rx="10" fill="#15803d"/>
  <rect x="320" y="157" width="150" height="15" fill="#15803d"/>
  <text class="node" x="395" y="163" text-anchor="middle">Entrenamiento</text>
  <text class="desc2" x="395" y="192" text-anchor="middle">se usa para aprender</text>

  <!-- Ajustar modelo -->
  <rect class="card" x="540" y="142" width="160" height="62" rx="10" stroke="#15803d"/>
  <rect x="540" y="142" width="160" height="30" rx="10" fill="#15803d"/>
  <rect x="540" y="157" width="160" height="15" fill="#15803d"/>
  <text class="node" x="620" y="163" text-anchor="middle">Ajustar modelo</text>
  <text class="desc2" x="620" y="192" text-anchor="middle">optimizar parámetros</text>
  <path class="green" d="M470,173 L538,173" marker-end="url(#ag)"/>

  <!-- Modelo entrenado -->
  <rect class="card" x="760" y="142" width="170" height="62" rx="10" stroke="#004a99"/>
  <rect x="760" y="142" width="170" height="30" rx="10" fill="#004a99"/>
  <rect x="760" y="157" width="170" height="15" fill="#004a99"/>
  <text class="node" x="845" y="163" text-anchor="middle">Modelo entrenado</text>
  <text class="desc2" x="845" y="192" text-anchor="middle">listo para evaluar</text>
  <path class="green" d="M700,173 L758,173" marker-end="url(#ag)"/>

  <!-- Prueba reservada -->
  <rect class="card" x="320" y="314" width="170" height="62" rx="10" stroke="#b45309" stroke-dasharray="6 4"/>
  <rect x="320" y="314" width="170" height="30" rx="10" fill="#b45309"/>
  <rect x="320" y="329" width="170" height="15" fill="#b45309"/>
  <text class="node" x="405" y="335" text-anchor="middle">Prueba (reservada)</text>
  <text class="desc2" x="405" y="364" text-anchor="middle">bloqueada, intacta</text>

  <!-- Evaluación final -->
  <rect class="card" x="760" y="300" width="170" height="92" rx="10" stroke="#0e7490"/>
  <rect x="760" y="300" width="170" height="32" rx="10" fill="#0e7490"/>
  <rect x="760" y="316" width="170" height="16" fill="#0e7490"/>
  <text class="node" x="845" y="322" text-anchor="middle">Evaluación final</text>
  <text class="desc2" x="845" y="354" text-anchor="middle">métricas imparciales</text>
  <text class="desc2" x="845" y="372" text-anchor="middle">en datos no vistos</text>

  <!-- Modelo entrenado -> evaluación -->
  <path class="arrow" d="M845,204 L845,298" marker-end="url(#ah)"/>
  <!-- Prueba -> evaluación (una vez) -->
  <path class="orange" d="M490,345 L758,345" marker-end="url(#ao)"/>
  <text class="otxt" x="558" y="338">se usa una vez, al final</text>

  <!-- Nota -->
  <rect x="50" y="412" width="880" height="44" rx="10" fill="#fff7ed" stroke="#b45309" stroke-width="1.6"/>
  <text class="label" x="490" y="439" text-anchor="middle">Nunca ajustes ni inspecciones la prueba durante el entrenamiento — tocarla temprano la convierte en otro set de entrenamiento e infla los resultados.</text>
</svg>
