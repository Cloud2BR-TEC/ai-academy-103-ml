<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="420" viewBox="0 0 1040 420" role="img" aria-labelledby="title desc">
  <title id="title">ML deployment flow</title>
  <desc id="desc">A six-stage deployment flow, each stage a checkpoint: registered model, package the scoring script and environment, validate locally, deploy, route traffic, and reach a live endpoint.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .node { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #0f172a; }
      .badge { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #ffffff; }
      .cap { font-family: Segoe UI, Arial, sans-serif; font-size: 12.5px; fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="420"/>
  <text class="title" x="60" y="52">ML deployment flow</text>
  <text class="subtitle" x="60" y="80">Each stage is a checkpoint — from a registered model to a live endpoint.</text>

  <!-- Arrows -->
  <line class="arrow" x1="190" y1="205" x2="216" y2="205" marker-end="url(#ah)"/>
  <line class="arrow" x1="348" y1="205" x2="374" y2="205" marker-end="url(#ah)"/>
  <line class="arrow" x1="506" y1="205" x2="532" y2="205" marker-end="url(#ah)"/>
  <line class="arrow" x1="664" y1="205" x2="690" y2="205" marker-end="url(#ah)"/>
  <line class="arrow" x1="822" y1="205" x2="848" y2="205" marker-end="url(#ah)"/>

  <!-- Node 1 -->
  <rect class="card" x="60" y="160" width="130" height="92" rx="12"/>
  <rect x="60" y="160" width="130" height="8" rx="4" fill="#004a99"/>
  <circle cx="125" cy="160" r="16" fill="#004a99"/>
  <text class="badge" x="125" y="165" text-anchor="middle">1</text>
  <text class="node" x="125" y="206" text-anchor="middle">Registered</text>
  <text class="node" x="125" y="226" text-anchor="middle">Model</text>
  <text class="cap" x="125" y="284" text-anchor="middle">Versioned artifact</text>
  <text class="cap" x="125" y="302" text-anchor="middle">in the registry</text>

  <!-- Node 2 -->
  <rect class="card" x="218" y="160" width="130" height="92" rx="12"/>
  <rect x="218" y="160" width="130" height="8" rx="4" fill="#004a99"/>
  <circle cx="283" cy="160" r="16" fill="#004a99"/>
  <text class="badge" x="283" y="165" text-anchor="middle">2</text>
  <text class="node" x="283" y="216" text-anchor="middle">Package</text>
  <text class="cap" x="283" y="284" text-anchor="middle">Scoring script +</text>
  <text class="cap" x="283" y="302" text-anchor="middle">environment</text>

  <!-- Node 3 -->
  <rect class="card" x="376" y="160" width="130" height="92" rx="12"/>
  <rect x="376" y="160" width="130" height="8" rx="4" fill="#004a99"/>
  <circle cx="441" cy="160" r="16" fill="#004a99"/>
  <text class="badge" x="441" y="165" text-anchor="middle">3</text>
  <text class="node" x="441" y="206" text-anchor="middle">Validate</text>
  <text class="node" x="441" y="226" text-anchor="middle">Locally</text>
  <text class="cap" x="441" y="284" text-anchor="middle">Smoke-test</text>
  <text class="cap" x="441" y="302" text-anchor="middle">before the cloud</text>

  <!-- Node 4 -->
  <rect class="card" x="534" y="160" width="130" height="92" rx="12"/>
  <rect x="534" y="160" width="130" height="8" rx="4" fill="#004a99"/>
  <circle cx="599" cy="160" r="16" fill="#004a99"/>
  <text class="badge" x="599" y="165" text-anchor="middle">4</text>
  <text class="node" x="599" y="216" text-anchor="middle">Deploy</text>
  <text class="cap" x="599" y="284" text-anchor="middle">Provision the</text>
  <text class="cap" x="599" y="302" text-anchor="middle">endpoint</text>

  <!-- Node 5 -->
  <rect class="card" x="692" y="160" width="130" height="92" rx="12"/>
  <rect x="692" y="160" width="130" height="8" rx="4" fill="#004a99"/>
  <circle cx="757" cy="160" r="16" fill="#004a99"/>
  <text class="badge" x="757" y="165" text-anchor="middle">5</text>
  <text class="node" x="757" y="206" text-anchor="middle">Route</text>
  <text class="node" x="757" y="226" text-anchor="middle">Traffic</text>
  <text class="cap" x="757" y="284" text-anchor="middle">Shift % to the</text>
  <text class="cap" x="757" y="302" text-anchor="middle">new version</text>

  <!-- Node 6 -->
  <rect class="card" x="850" y="160" width="130" height="92" rx="12" stroke="#15803d"/>
  <rect x="850" y="160" width="130" height="8" rx="4" fill="#15803d"/>
  <circle cx="915" cy="160" r="16" fill="#15803d"/>
  <path d="M908,160 l5,5 l9,-10" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="node" x="915" y="206" text-anchor="middle" fill="#15803d">Live</text>
  <text class="node" x="915" y="226" text-anchor="middle" fill="#15803d">Endpoint</text>
  <text class="cap" x="915" y="284" text-anchor="middle">Serving real</text>
  <text class="cap" x="915" y="302" text-anchor="middle">requests</text>

  <!-- Footer note -->
  <rect x="320" y="350" width="400" height="32" rx="16" fill="#eef2f7"/>
  <text class="cap" x="520" y="371" text-anchor="middle">Pass every checkpoint before sending live traffic.</text>
</svg>
