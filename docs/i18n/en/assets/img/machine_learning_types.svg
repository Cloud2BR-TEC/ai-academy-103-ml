<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc">
  <title id="title">Types of machine learning</title>
  <desc id="desc">Supervised, unsupervised and reinforcement learning side by side, each distinguished by its feedback signal.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .head { font-family: Segoe UI, Arial, sans-serif; font-size: 19px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
      .item { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; fill: #1f2937; }
      .siglbl { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #0f172a; }
      .sigval { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; fill: #b45309; font-weight: 700; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="520"/>
  <text class="title" x="60" y="52">Types of Machine Learning</text>
  <text class="subtitle" x="60" y="80">Each type is distinguished by the feedback signal it learns from</text>

  <!-- Supervised -->
  <rect class="card" x="50" y="120" width="290" height="340" rx="10" stroke="#004a99" stroke-width="2"/>
  <rect x="50" y="120" width="290" height="44" rx="10" fill="#004a99"/>
  <text class="head" x="195" y="149">Supervised</text>
  <text class="item" x="70" y="200">Learns from data that is</text>
  <text class="item" x="70" y="224">already labelled with the</text>
  <text class="item" x="70" y="248">correct answers.</text>
  <text class="item" x="70" y="290">Examples:</text>
  <text class="item" x="70" y="314">• Spam vs not spam</text>
  <text class="item" x="70" y="338">• Price prediction</text>
  <rect x="70" y="370" width="250" height="64" rx="8" fill="#eff6ff" stroke="#004a99" stroke-width="1.5"/>
  <text class="siglbl" x="84" y="396">Feedback signal:</text>
  <text class="sigval" x="84" y="420">Labelled answers</text>

  <!-- Unsupervised -->
  <rect class="card" x="375" y="120" width="290" height="340" rx="10" stroke="#0e7490" stroke-width="2"/>
  <rect x="375" y="120" width="290" height="44" rx="10" fill="#0e7490"/>
  <text class="head" x="520" y="149">Unsupervised</text>
  <text class="item" x="395" y="200">Finds structure in data</text>
  <text class="item" x="395" y="224">with no labels — groups</text>
  <text class="item" x="395" y="248">and patterns only.</text>
  <text class="item" x="395" y="290">Examples:</text>
  <text class="item" x="395" y="314">• Customer segments</text>
  <text class="item" x="395" y="338">• Anomaly detection</text>
  <rect x="395" y="370" width="250" height="64" rx="8" fill="#ecfeff" stroke="#0e7490" stroke-width="1.5"/>
  <text class="siglbl" x="409" y="396">Feedback signal:</text>
  <text class="sigval" x="409" y="420">Structure only</text>

  <!-- Reinforcement -->
  <rect class="card" x="700" y="120" width="290" height="340" rx="10" stroke="#15803d" stroke-width="2"/>
  <rect x="700" y="120" width="290" height="44" rx="10" fill="#15803d"/>
  <text class="head" x="845" y="149">Reinforcement</text>
  <text class="item" x="720" y="200">Learns by interacting with</text>
  <text class="item" x="720" y="224">an environment and getting</text>
  <text class="item" x="720" y="248">rewards or penalties.</text>
  <text class="item" x="720" y="290">Examples:</text>
  <text class="item" x="720" y="314">• Game playing</text>
  <text class="item" x="720" y="338">• Robotics control</text>
  <rect x="720" y="370" width="250" height="64" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5"/>
  <text class="siglbl" x="734" y="396">Feedback signal:</text>
  <text class="sigval" x="734" y="420">Reward from actions</text>
</svg>
