<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="480" viewBox="0 0 1040 480" role="img" aria-labelledby="title desc">
  <title id="title">Production ML infrastructure stack</title>
  <desc id="desc">The production machine learning stack as distinct connected components, where the model registry is one box among many.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .head { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .sub { font-family: Segoe UI, Arial, sans-serif; font-size: 12px; fill: #475569; text-anchor: middle; }
      .badge { font-family: Segoe UI, Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
      .note { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; fill: #15803d; font-weight: 700; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="480"/>
  <text class="title" x="60" y="52">Production ML Infrastructure</text>
  <text class="subtitle" x="60" y="80">A model is just one component in a larger production system</text>

  <!-- Box 1 Data Ingestion -->
  <rect class="card" x="40" y="200" width="140" height="150" rx="10" stroke="#004a99" stroke-width="2"/>
  <circle cx="60" cy="220" r="13" fill="#004a99"/>
  <text class="badge" x="60" y="224">1</text>
  <text class="head" x="110" y="258" fill="#004a99">Data</text>
  <text class="head" x="110" y="276" fill="#004a99">Ingestion</text>
  <text class="sub" x="110" y="306">Collect &amp; land</text>
  <text class="sub" x="110" y="322">raw data</text>

  <!-- Box 2 Feature Store -->
  <rect class="card" x="204" y="200" width="140" height="150" rx="10" stroke="#0e7490" stroke-width="2"/>
  <circle cx="224" cy="220" r="13" fill="#0e7490"/>
  <text class="badge" x="224" y="224">2</text>
  <text class="head" x="274" y="258" fill="#0e7490">Feature</text>
  <text class="head" x="274" y="276" fill="#0e7490">Store</text>
  <text class="sub" x="274" y="306">Reusable</text>
  <text class="sub" x="274" y="322">feature sets</text>

  <!-- Box 3 Training Orchestration -->
  <rect class="card" x="368" y="200" width="140" height="150" rx="10" stroke="#b45309" stroke-width="2"/>
  <circle cx="388" cy="220" r="13" fill="#b45309"/>
  <text class="badge" x="388" y="224">3</text>
  <text class="head" x="438" y="258" fill="#b45309">Training</text>
  <text class="head" x="438" y="276" fill="#b45309">Orchestration</text>
  <text class="sub" x="438" y="306">Pipelines &amp;</text>
  <text class="sub" x="438" y="322">compute</text>

  <!-- Box 4 Model Registry (highlighted) -->
  <rect class="card" x="532" y="190" width="140" height="170" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="3"/>
  <circle cx="552" cy="212" r="13" fill="#15803d"/>
  <text class="badge" x="552" y="216">4</text>
  <text class="head" x="602" y="252" fill="#15803d">Model</text>
  <text class="head" x="602" y="270" fill="#15803d">Registry</text>
  <text class="sub" x="602" y="300">Versioned</text>
  <text class="sub" x="602" y="316">models</text>
  <text class="sub" x="602" y="340" font-weight="700" fill="#15803d">the model</text>

  <!-- Box 5 Serving -->
  <rect class="card" x="696" y="200" width="140" height="150" rx="10" stroke="#64748b" stroke-width="2"/>
  <circle cx="716" cy="220" r="13" fill="#64748b"/>
  <text class="badge" x="716" y="224">5</text>
  <text class="head" x="766" y="258" fill="#64748b">Serving</text>
  <text class="sub" x="766" y="306">Endpoints</text>
  <text class="sub" x="766" y="322">&amp; APIs</text>

  <!-- Box 6 Monitoring -->
  <rect class="card" x="860" y="200" width="140" height="150" rx="10" stroke="#004a99" stroke-width="2"/>
  <circle cx="880" cy="220" r="13" fill="#004a99"/>
  <text class="badge" x="880" y="224">6</text>
  <text class="head" x="930" y="258" fill="#004a99">Monitoring</text>
  <text class="sub" x="930" y="306">Drift &amp;</text>
  <text class="sub" x="930" y="322">metrics</text>

  <!-- arrows -->
  <line class="arrow" x1="180" y1="275" x2="200" y2="275" marker-end="url(#ah)"/>
  <line class="arrow" x1="344" y1="275" x2="364" y2="275" marker-end="url(#ah)"/>
  <line class="arrow" x1="508" y1="275" x2="528" y2="275" marker-end="url(#ah)"/>
  <line class="arrow" x1="672" y1="275" x2="692" y2="275" marker-end="url(#ah)"/>
  <line class="arrow" x1="836" y1="275" x2="856" y2="275" marker-end="url(#ah)"/>

  <text class="note" x="60" y="420">The model is one box among many — production ML is mostly the surrounding infrastructure.</text>
</svg>
