<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="510" viewBox="0 0 1040 510" role="img" aria-labelledby="title desc">
  <title id="title">Detailed steps of an ML-based time-series forecast</title>
  <desc id="desc">A six-step flow from ingesting history to monitoring, highlighting rolling-origin validation where the train/test split advances through time instead of using random k-fold.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 27px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .num { fill: #ffffff; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .nodehead { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .desc2 { font-family: Segoe UI, Arial, sans-serif; font-size: 11px; fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; }
      .panel { fill: #fff7ed; stroke: #b45309; stroke-width: 1.5; }
      .ptitle { font-family: Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #b45309; }
      .rowlab { font-family: Segoe UI, Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #334155; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 12px; fill: #475569; }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/>
    </marker>
    <marker id="aho" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#b45309"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="510"/>
  <text class="title" x="60" y="50">Detailed steps of an ML-based time-series forecast</text>
  <text class="subtitle" x="60" y="78">Respect time order: validate by advancing the origin, never with random k-fold.</text>

  <!-- arrows -->
  <line class="arrow" x1="197" y1="210" x2="211" y2="210" marker-end="url(#ah)"/>
  <line class="arrow" x1="350" y1="210" x2="364" y2="210" marker-end="url(#ah)"/>
  <line class="arrow" x1="504" y1="210" x2="518" y2="210" marker-end="url(#ah)"/>
  <line class="arrow" x1="657" y1="210" x2="671" y2="210" marker-end="url(#ah)"/>
  <line class="arrow" x1="810" y1="210" x2="824" y2="210" marker-end="url(#ah)"/>

  <!-- 1 -->
  <rect class="card" x="60" y="150" width="135" height="120" rx="10"/>
  <circle cx="127" cy="176" r="13" fill="#004a99"/>
  <text class="num" x="127" y="181" text-anchor="middle">1</text>
  <text class="nodehead" x="127" y="210" text-anchor="middle" fill="#004a99">Ingest History</text>
  <text class="desc2" x="127" y="236" text-anchor="middle">Load the historical</text>
  <text class="desc2" x="127" y="251" text-anchor="middle">series, ordered by time.</text>

  <!-- 2 -->
  <rect class="card" x="213" y="150" width="135" height="120" rx="10"/>
  <circle cx="280" cy="176" r="13" fill="#0e7490"/>
  <text class="num" x="280" y="181" text-anchor="middle">2</text>
  <text class="nodehead" x="280" y="204" text-anchor="middle" fill="#0e7490">Feature</text>
  <text class="nodehead" x="280" y="221" text-anchor="middle" fill="#0e7490">Engineering</text>
  <text class="desc2" x="280" y="245" text-anchor="middle">lags &#183; rolling</text>
  <text class="desc2" x="280" y="260" text-anchor="middle">&#183; calendar</text>

  <!-- 3 highlighted -->
  <rect x="367" y="150" width="135" height="120" rx="10" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
  <circle cx="434" cy="176" r="13" fill="#b45309"/>
  <text class="num" x="434" y="181" text-anchor="middle">3</text>
  <text class="nodehead" x="434" y="204" text-anchor="middle" fill="#b45309">Rolling-Origin</text>
  <text class="nodehead" x="434" y="221" text-anchor="middle" fill="#b45309">Validation</text>
  <text class="desc2" x="434" y="245" text-anchor="middle">Advance the split</text>
  <text class="desc2" x="434" y="260" text-anchor="middle">through time.</text>

  <!-- 4 -->
  <rect class="card" x="520" y="150" width="135" height="120" rx="10"/>
  <circle cx="587" cy="176" r="13" fill="#15803d"/>
  <text class="num" x="587" y="181" text-anchor="middle">4</text>
  <text class="nodehead" x="587" y="210" text-anchor="middle" fill="#15803d">Train</text>
  <text class="desc2" x="587" y="236" text-anchor="middle">Fit on the past,</text>
  <text class="desc2" x="587" y="251" text-anchor="middle">validate ahead.</text>

  <!-- 5 -->
  <rect class="card" x="673" y="150" width="135" height="120" rx="10"/>
  <circle cx="740" cy="176" r="13" fill="#004a99"/>
  <text class="num" x="740" y="181" text-anchor="middle">5</text>
  <text class="nodehead" x="740" y="204" text-anchor="middle" fill="#004a99">Forecast</text>
  <text class="nodehead" x="740" y="221" text-anchor="middle" fill="#004a99">Horizon</text>
  <text class="desc2" x="740" y="245" text-anchor="middle">Predict H steps</text>
  <text class="desc2" x="740" y="260" text-anchor="middle">into the future.</text>

  <!-- 6 -->
  <rect class="card" x="826" y="150" width="135" height="120" rx="10"/>
  <circle cx="893" cy="176" r="13" fill="#64748b"/>
  <text class="num" x="893" y="181" text-anchor="middle">6</text>
  <text class="nodehead" x="893" y="210" text-anchor="middle" fill="#64748b">Monitor</text>
  <text class="desc2" x="893" y="236" text-anchor="middle">Track drift and</text>
  <text class="desc2" x="893" y="251" text-anchor="middle">accuracy over time.</text>

  <!-- rolling-origin panel -->
  <rect class="panel" x="60" y="300" width="900" height="180" rx="10"/>
  <text class="ptitle" x="80" y="330">Rolling-origin validation &#8212; the split advances through time (not random k-fold)</text>

  <rect x="80" y="350" width="380" height="20" rx="4" fill="#004a99"/>
  <rect x="460" y="350" width="80" height="20" rx="4" fill="#b45309"/>
  <text class="rowlab" x="560" y="365">fold 1</text>

  <rect x="80" y="385" width="500" height="20" rx="4" fill="#004a99"/>
  <rect x="580" y="385" width="80" height="20" rx="4" fill="#b45309"/>
  <text class="rowlab" x="680" y="400">fold 2</text>

  <rect x="80" y="420" width="620" height="20" rx="4" fill="#004a99"/>
  <rect x="700" y="420" width="80" height="20" rx="4" fill="#b45309"/>
  <text class="rowlab" x="800" y="435">fold 3</text>

  <line x1="80" y1="455" x2="900" y2="455" stroke="#0f172a" stroke-width="2" marker-end="url(#ah)"/>
  <text class="small" x="80" y="473">time &#8594;</text>
  <rect x="280" y="461" width="14" height="11" fill="#004a99"/>
  <text class="small" x="300" y="471">train</text>
  <rect x="360" y="461" width="14" height="11" fill="#b45309"/>
  <text class="small" x="380" y="471">validate (just after the origin)</text>
</svg>
