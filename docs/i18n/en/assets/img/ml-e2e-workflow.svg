<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="1120" viewBox="0 0 1040 1120" role="img" aria-labelledby="title desc">
  <title id="title">The End-to-End Machine Learning Workflow</title>
  <desc id="desc">A vertical pipeline with three grouped stages. Source data and preparation feed into model development and training, whose output is served at a deployment endpoint on Kubernetes.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .tab { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .node { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
      .nt { fill: #1f2937; font-family: Segoe UI, Arial, sans-serif; font-size: 12.5px; }
      .seblbl { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 13px; font-weight: 700; }
      .cap { fill: #475569; font-family: Segoe UI, Arial, sans-serif; font-size: 12.5px; }
      .cyl { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 1.5; }
      .cyltop { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; }
      .con { stroke: #475569; stroke-width: 1.6; fill: none; }
      .fnd { fill: #1e293b; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 600; }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#475569"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1040" height="1120"/>
  <text class="title" x="44" y="48">The End-to-End Machine Learning Workflow</text>
  <text class="subtitle" x="44" y="76">From raw data to a deployed model: prepare the data, develop and train the model, then serve it at an endpoint</text>

  <!-- ============ STAGE 1: SOURCE DATA AND PREPARATION ============ -->
  <rect x="120" y="100" width="800" height="186" rx="14" fill="#ecfeff" fill-opacity="0.55" stroke="#0e7490" stroke-width="2.5" stroke-dasharray="9 7"/>
  <rect x="688" y="84" width="232" height="34" rx="9" fill="#0e7490"/>
  <text class="tab" x="804" y="106" text-anchor="middle" fill="#ffffff">Source Data and Preparation</text>
  <text class="tab" x="138" y="124" fill="#0e7490" font-size="12px">Module 08</text>

  <!-- cylinder 1 -->
  <path class="cyl" d="M212,158 v60 a66,15 0 0 0 132,0 v-60 Z"/>
  <ellipse class="cyltop" cx="278" cy="158" rx="66" ry="15"/>
  <text class="cap" x="278" y="246" text-anchor="middle">Source data</text>
  <!-- cylinder 2 -->
  <path class="cyl" d="M408,158 v60 a66,15 0 0 0 132,0 v-60 Z"/>
  <ellipse class="cyltop" cx="474" cy="158" rx="66" ry="15"/>
  <text class="cap" x="474" y="246" text-anchor="middle">Prepared data</text>

  <!-- prep steps -->
  <rect class="node" x="622" y="138" width="216" height="34" rx="6"/>
  <text class="nt" x="730" y="159" text-anchor="middle">Collect sources</text>
  <rect class="node" x="622" y="182" width="216" height="34" rx="6"/>
  <text class="nt" x="730" y="203" text-anchor="middle">Clean and encode</text>
  <rect class="node" x="622" y="226" width="216" height="34" rx="6"/>
  <text class="nt" x="730" y="247" text-anchor="middle">Train / test split</text>
  <path class="con" d="M730,172 L730,182" marker-end="url(#ah)"/>
  <path class="con" d="M730,216 L730,226" marker-end="url(#ah)"/>
  <path class="con" d="M540,188 L618,188" marker-end="url(#ah)"/>

  <!-- orange arrow Stage1 -> Stage2 -->
  <rect x="509" y="294" width="22" height="30" fill="#f59e0b"/>
  <polygon points="492,322 548,322 520,348" fill="#f59e0b"/>

  <!-- ============ STAGE 2: MODEL DEVELOPMENT AND TRAINING ============ -->
  <rect x="44" y="360" width="952" height="416" rx="14" fill="#fffbeb" fill-opacity="0.6" stroke="#b45309" stroke-width="2.5" stroke-dasharray="9 7"/>
  <rect x="690" y="344" width="306" height="34" rx="9" fill="#b45309"/>
  <text class="tab" x="843" y="366" text-anchor="middle" fill="#ffffff">Model Development and Training</text>
  <text class="tab" x="62" y="384" fill="#b45309" font-size="12px">Modules 06, 07, 09, 10</text>

  <!-- BEGIN -->
  <rect class="node" x="455" y="398" width="130" height="34" rx="6" fill="#fef3c7" stroke="#b45309"/>
  <text class="seblbl" x="520" y="420" text-anchor="middle">BEGIN</text>
  <path class="con" d="M520,432 L520,452"/>
  <!-- top bus -->
  <path class="con" d="M150,452 L830,452"/>
  <path class="con" d="M150,452 L150,470" marker-end="url(#ah)"/>
  <path class="con" d="M380,452 L380,470" marker-end="url(#ah)"/>
  <path class="con" d="M610,452 L610,470" marker-end="url(#ah)"/>
  <path class="con" d="M830,452 L830,470" marker-end="url(#ah)"/>

  <!-- Column A: data handling -->
  <rect class="node" x="62" y="470" width="176" height="38" rx="6"/>
  <text class="nt" x="150" y="494" text-anchor="middle">Read source data</text>
  <rect class="node" x="62" y="534" width="176" height="38" rx="6"/>
  <text class="nt" x="150" y="558" text-anchor="middle">Clean columns</text>
  <rect class="node" x="62" y="598" width="176" height="38" rx="6"/>
  <text class="nt" x="150" y="622" text-anchor="middle">Identify datasets</text>
  <path class="con" d="M150,508 L150,534" marker-end="url(#ah)"/>
  <path class="con" d="M150,572 L150,598" marker-end="url(#ah)"/>

  <!-- Column B: AutoML -->
  <rect class="node" x="292" y="470" width="176" height="38" rx="6"/>
  <text class="nt" x="380" y="494" text-anchor="middle">AutoML setup</text>
  <rect class="node" x="292" y="534" width="176" height="38" rx="6"/>
  <text class="nt" x="380" y="558" text-anchor="middle">Workspace setup</text>
  <rect class="node" x="292" y="598" width="176" height="38" rx="6"/>
  <text class="nt" x="380" y="622" text-anchor="middle">AutoML execution</text>
  <path class="con" d="M380,508 L380,534" marker-end="url(#ah)"/>
  <path class="con" d="M380,572 L380,598" marker-end="url(#ah)"/>

  <!-- Column C: metrics -->
  <rect class="node" x="522" y="470" width="176" height="38" rx="6"/>
  <text class="nt" x="610" y="494" text-anchor="middle">Calculate metrics</text>

  <!-- Column D: results -->
  <rect class="node" x="742" y="470" width="176" height="38" rx="6"/>
  <text class="nt" x="830" y="494" text-anchor="middle">Display results</text>
  <rect class="node" x="742" y="534" width="176" height="38" rx="6"/>
  <text class="nt" x="830" y="558" text-anchor="middle">Explainability</text>
  <path class="con" d="M830,508 L830,534" marker-end="url(#ah)"/>

  <!-- convergence to END -->
  <path class="con" d="M150,636 L150,690"/>
  <path class="con" d="M380,636 L380,690"/>
  <path class="con" d="M610,508 L610,690"/>
  <path class="con" d="M830,572 L830,690"/>
  <path class="con" d="M150,690 L830,690"/>
  <path class="con" d="M520,690 L520,712" marker-end="url(#ah)"/>
  <!-- END -->
  <rect class="node" x="455" y="712" width="130" height="34" rx="6" fill="#fef3c7" stroke="#b45309"/>
  <text class="seblbl" x="520" y="734" text-anchor="middle">END</text>

  <!-- orange arrow Stage2 -> Stage3 -->
  <rect x="509" y="784" width="22" height="30" fill="#f59e0b"/>
  <polygon points="492,812 548,812 520,838" fill="#f59e0b"/>

  <!-- ============ STAGE 3: DEPLOYMENT ENDPOINT ============ -->
  <rect x="300" y="850" width="440" height="196" rx="14" fill="#eff6ff" fill-opacity="0.7" stroke="#004a99" stroke-width="2.5" stroke-dasharray="9 7"/>
  <rect x="520" y="834" width="220" height="34" rx="9" fill="#004a99"/>
  <text class="tab" x="630" y="856" text-anchor="middle" fill="#ffffff">Deployment Endpoint</text>
  <text class="tab" x="318" y="876" fill="#004a99" font-size="12px">Module 13</text>

  <!-- kubernetes hexagon -->
  <polygon points="372,892 405,911 405,949 372,968 339,949 339,911" fill="#326ce5" stroke="#1d4ed8" stroke-width="1.5"/>
  <circle cx="372" cy="930" r="17" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <circle cx="372" cy="930" r="4" fill="#ffffff"/>
  <g stroke="#ffffff" stroke-width="2">
    <line x1="372" y1="913" x2="372" y2="921"/>
    <line x1="388" y1="924" x2="381" y2="928"/>
    <line x1="383" y1="945" x2="378" y2="938"/>
    <line x1="361" y1="945" x2="366" y2="938"/>
    <line x1="356" y1="924" x2="363" y2="928"/>
  </g>
  <text class="cap" x="372" y="994" text-anchor="middle" font-weight="700">Kubernetes</text>

  <!-- endpoint steps -->
  <rect class="node" x="446" y="888" width="262" height="34" rx="6"/>
  <text class="nt" x="577" y="909" text-anchor="middle">Register the model</text>
  <rect class="node" x="446" y="930" width="262" height="34" rx="6"/>
  <text class="nt" x="577" y="951" text-anchor="middle">Online or batch endpoint</text>
  <rect class="node" x="446" y="972" width="262" height="34" rx="6"/>
  <text class="nt" x="577" y="993" text-anchor="middle">Kubernetes serving</text>
  <path class="con" d="M577,922 L577,930" marker-end="url(#ah)"/>
  <path class="con" d="M577,964 L577,972" marker-end="url(#ah)"/>

  <!-- ============ Foundations band ============ -->
  <rect x="44" y="1062" width="952" height="44" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text class="fnd" x="520" y="1090" text-anchor="middle">Foundations under every stage: Mathematics (Module 01) and Neural Networks and Deep Learning (Module 05)</text>
</svg>
