<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">Confusion matrix — good vs bad</title>
  <desc id="desc">Two 2x2 confusion matrices side by side. The good model concentrates counts on the diagonal (correct predictions); the weak model scatters heavy mass onto the off-diagonal (errors). Cells are shaded by count intensity.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0f172a; font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #334155; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .cardhead { font-family: Segoe UI, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #ffffff; }
      .cell { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 700; }
      .count { font-family: Segoe UI, Arial, sans-serif; font-size: 22px; font-weight: 700; }
      .axislbl { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; }
      .ticklbl { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; fill: #334155; }
      .desc2 { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; fill: #475569; }
      .cellstroke { fill: none; stroke: #ffffff; stroke-width: 3; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1040" height="560"/>
  <text class="title" x="60" y="52">Confusion matrix — good vs bad</text>
  <text class="subtitle" x="60" y="80">A good model concentrates counts on the diagonal; a weak one scatters them off-diagonal.</text>

  <!-- ===== GOOD ===== -->
  <rect class="card" x="60" y="110" width="440" height="420" rx="12"/>
  <rect x="60" y="110" width="440" height="42" rx="12" fill="#0e7490"/>
  <rect x="60" y="130" width="440" height="22" fill="#0e7490"/>
  <text class="cardhead" x="84" y="139">Good model</text>

  <text class="axislbl" x="307" y="180" text-anchor="middle">Predicted</text>
  <text class="ticklbl" x="250" y="206" text-anchor="middle">Positive</text>
  <text class="ticklbl" x="385" y="206" text-anchor="middle">Negative</text>
  <text class="axislbl" x="92" y="335" text-anchor="middle" transform="rotate(-90 92 335)">Actual</text>
  <text class="ticklbl" x="170" y="280" text-anchor="end">Positive</text>
  <text class="ticklbl" x="170" y="400" text-anchor="end">Negative</text>

  <!-- cells: col0 185-315, col1 320-450 ; row0 220-330, row1 340-450 -->
  <rect x="185" y="220" width="130" height="110" fill="#0e7490"/>
  <rect x="320" y="220" width="130" height="110" fill="#cffafe"/>
  <rect x="185" y="340" width="130" height="110" fill="#cffafe"/>
  <rect x="320" y="340" width="130" height="110" fill="#0e7490"/>
  <rect class="cellstroke" x="185" y="220" width="265" height="230"/>
  <line class="cellstroke" x1="185" y1="330" x2="450" y2="330"/>
  <line class="cellstroke" x1="315" y1="220" x2="315" y2="450"/>

  <text class="cell" x="250" y="270" text-anchor="middle" fill="#ffffff">True Positive</text>
  <text class="count" x="250" y="302" text-anchor="middle" fill="#ffffff">86</text>
  <text class="cell" x="385" y="270" text-anchor="middle" fill="#0e7490">False Negative</text>
  <text class="count" x="385" y="302" text-anchor="middle" fill="#0e7490">6</text>
  <text class="cell" x="250" y="390" text-anchor="middle" fill="#0e7490">False Positive</text>
  <text class="count" x="250" y="422" text-anchor="middle" fill="#0e7490">8</text>
  <text class="cell" x="385" y="390" text-anchor="middle" fill="#ffffff">True Negative</text>
  <text class="count" x="385" y="422" text-anchor="middle" fill="#ffffff">80</text>

  <text class="desc2" x="84" y="492">Most mass on the diagonal → accurate.</text>

  <!-- ===== BAD ===== -->
  <rect class="card" x="540" y="110" width="440" height="420" rx="12"/>
  <rect x="540" y="110" width="440" height="42" rx="12" fill="#b91c1c"/>
  <rect x="540" y="130" width="440" height="22" fill="#b91c1c"/>
  <text class="cardhead" x="564" y="139">Weak model</text>

  <text class="axislbl" x="787" y="180" text-anchor="middle">Predicted</text>
  <text class="ticklbl" x="730" y="206" text-anchor="middle">Positive</text>
  <text class="ticklbl" x="865" y="206" text-anchor="middle">Negative</text>
  <text class="axislbl" x="572" y="335" text-anchor="middle" transform="rotate(-90 572 335)">Actual</text>
  <text class="ticklbl" x="650" y="280" text-anchor="end">Positive</text>
  <text class="ticklbl" x="650" y="400" text-anchor="end">Negative</text>

  <rect x="665" y="220" width="130" height="110" fill="#fecaca"/>
  <rect x="800" y="220" width="130" height="110" fill="#b91c1c"/>
  <rect x="665" y="340" width="130" height="110" fill="#dc2626"/>
  <rect x="800" y="340" width="130" height="110" fill="#fecaca"/>
  <rect class="cellstroke" x="665" y="220" width="265" height="230"/>
  <line class="cellstroke" x1="665" y1="330" x2="930" y2="330"/>
  <line class="cellstroke" x1="795" y1="220" x2="795" y2="450"/>

  <text class="cell" x="730" y="270" text-anchor="middle" fill="#b91c1c">True Positive</text>
  <text class="count" x="730" y="302" text-anchor="middle" fill="#b91c1c">30</text>
  <text class="cell" x="865" y="270" text-anchor="middle" fill="#ffffff">False Negative</text>
  <text class="count" x="865" y="302" text-anchor="middle" fill="#ffffff">44</text>
  <text class="cell" x="730" y="390" text-anchor="middle" fill="#ffffff">False Positive</text>
  <text class="count" x="730" y="422" text-anchor="middle" fill="#ffffff">40</text>
  <text class="cell" x="865" y="390" text-anchor="middle" fill="#b91c1c">True Negative</text>
  <text class="count" x="865" y="422" text-anchor="middle" fill="#b91c1c">32</text>

  <text class="desc2" x="564" y="492">Mass off the diagonal → many errors.</text>
</svg>
