site_name: "Machine Learning 103"
site_description: Practical setup and model build guide for Azure ML Studio and Fabric.
site_url: https://cloud2br-tec.github.io/ai-academy-103-ml/
docs_dir: docs/i18n
copyright: Copyright &copy; 2026 <a href="https://github.com/Cloud2BR-TEC" target="_blank" rel="noopener">Cloud2BR TEC</a>

theme:
  name: material
  language: en
  logo: assets/img/org-logo.png
  favicon: assets/img/org-logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    scheme: default
    primary: blue
    accent: blue

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: "Español"
          build: true
          nav_translations:
            Home: Inicio
            01. Environment and Access Setup: "01. Setup de Entorno y Acceso"
            02. Build One Model in Azure ML Studio: "02. Crear un Modelo en Azure ML Studio"
            03. Register and Deploy Endpoint in Azure ML: "03. Registrar y Desplegar Endpoint en Azure ML"
            04. Configure Microsoft Fabric for AI Workloads: "04. Configurar Microsoft Fabric para Cargas de IA"
            05. Build One LLM Flow in Fabric Notebooks: "05. Crear un Flujo LLM en Notebooks de Fabric"
            06. SynapseML and LangChain Integration Pattern: "06. Patrón de Integración con SynapseML y LangChain"
            07. Operational Checklist (Security, Cost, Reliability): "07. Checklist Operativo (Seguridad, Costo, Confiabilidad)"
            08. End-to-End Validation and Handover: "08. Validación End-to-End y Entrega"
            Reference: Referencia
            Overview: "Visión General"
            Mathematical Model Deep Dive: "Análisis Matemático Profundo de Modelos"
            CLI Commands: "Comandos CLI"
            Glossary: Glosario
            score.py: "score.py"
            sample_data.csv: "sample_data.csv"
            ML Creation Notebook: "Notebook de Creación de Modelos"
            Fabric LLMs Notebook: "Notebook LLMs en Fabric"

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: false
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - assets/js/mermaid-init.js
  - assets/js/org-link.js

extra_css:
  - assets/css/custom.css

extra:
  generator: false

nav:
  - Home: index.md
  - 01. Environment and Access Setup: modules/01-environment-access-setup.md
  - 02. Build One Model in Azure ML Studio: modules/02-build-one-model-azure-ml-studio.md
  - 03. Register and Deploy Endpoint in Azure ML: modules/03-register-deploy-endpoint-azure-ml.md
  - 04. Configure Microsoft Fabric for AI Workloads: modules/04-configure-fabric-ai-workloads.md
  - 05. Build One LLM Flow in Fabric Notebooks: modules/05-build-one-llm-flow-fabric.md
  - 06. SynapseML and LangChain Integration Pattern: modules/06-synapseml-langchain-pattern.md
  - 07. Operational Checklist (Security, Cost, Reliability): modules/07-operational-checklist.md
  - 08. End-to-End Validation and Handover: modules/08-end-to-end-validation-handover.md
  - Reference:
      - Overview: reference/index.md
      - Mathematical Model Deep Dive: reference/model-math-deep-dive.md
      - CLI Commands: reference/cli-commands.md
      - Glossary: reference/glossary.md
      - score.py: reference/score-py.md
      - sample_data.csv: reference/sample-data-csv.md
      - ML Creation Notebook: reference/ml-creation-notebook.md
      - Fabric LLMs Notebook: reference/fabric-llms-notebook.md
